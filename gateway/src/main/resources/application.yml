server:
  port: 8080

spring:
  application:
    name: techcup-gateway
  cloud:
    gateway:
      routes:
        # Rutas PÚBLICAS (sin autenticación)
        - id: identity-public
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/register, /api/auth/login

        # Rutas PROTEGIDAS
        - id: identity-protected
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - name: AuthFilter

        - id: users-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**
          filters:
            - name: AuthFilter

        - id: teams-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/teams/**
          filters:
            - name: AuthFilter

        - id: tournament-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/tournaments/**
          filters:
            - name: AuthFilter

jwt:
  secret: TechCupAlpineSecretKey2025MustBe256BitsLong!!

management:
  endpoints:
    web:
      exposure:
        include: health, info
