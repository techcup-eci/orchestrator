server:
  port: 8081

spring:
  application:
    name: techcup-identity-service
  datasource:
    url: jdbc:postgresql://localhost:5432/techcup_identity
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: TechCupAlpineSecretKey2025MustBe256BitsLong!!
  expiration-ms: 3600000  # 1 hora

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
