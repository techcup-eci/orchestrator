name: Deploy Gateway to Azure

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Login to ACR
        run: az acr login --name acrgatewaytechcup

      - name: Build and push image
        run: |
          docker build -t acrgatewaytechcup.azurecr.io/gateway-techcup:latest .
          docker push acrgatewaytechcup.azurecr.io/gateway-techcup:latest

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name gateway-techcup \
            --resource-group rg-gateway-techcup \
            --image acrgatewaytechcup.azurecr.io/gateway-techcup:latest